name: "Create README for OctoAcme Docs"
description: "Create a README for OctoAcme Project Management Docs with links and processes summary"
title: "[README]: OctoAcme Project Management Docs - Processes Summary and Links"
labels: ["documentation", "process improvement"]
body:
  - type: textarea
    id: content_summary
    attributes:
      label: "Summary of New Content"
      description: "Briefly describe the new content or update you want to add."
      value: "Create a comprehensive README for the OctoAcme Project Management documentation suite. The README should serve as the central entry point for all project management processes, including:\n\n- Overview of OctoAcme project management approach and principles\n- Comprehensive list of all process documentation with descriptions\n- Links to individual process documents in the docs/ folder\n- Quick reference guide to key roles and artifacts\n- Navigation guide for new team members\n\nThis README will centralize scattered project management knowledge and provide equal access to all team members."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "Why is this update needed?"
      description: "Explain the reason for this addition."
      value: "The OctoAcme project management documentation exists as separate files in the docs/ folder, making it difficult for new team members to discover and navigate all available processes. A centralized README will:\n\n1. Serve as a single entry point for all project management guidance\n2. Provide quick navigation to each process document\n3. Give an overview of the complete project management lifecycle\n4. Reduce onboarding time and single-person dependency risk\n5. Establish a clear, discoverable knowledge base that aligns with the purpose of using Copilot Spaces to scale institutional knowledge"
    validations:
      required: true

  - type: textarea
    id: example_content
    attributes:
      label: "Suggested Content"
      description: "Paste the proposed new text and structure for the README."
      value: "# OctoAcme Project Management Documentation\n\n## Overview\nOctoAcme uses a structured, customer-first approach to project management. Our processes emphasize iterative delivery, clear ownership, data-informed decisions, and psychological safety. This documentation suite provides guidance for all phases of the project lifecycle.\n\n## Core Principles\n- **Customer-first**: Prioritize customer value and usability\n- **Iterative delivery**: Deliver small, testable increments\n- **Clear ownership**: Each project has named Project Manager (PM) and Product Lead\n- **Data-informed decisions**: Measure impact and iterate based on evidence\n- **Psychological safety**: Encourage feedback and learning\n\n## Project Lifecycle Overview\nOctoAcme projects follow five key phases:\n\n1. **Initiation** - Validate business need, align stakeholders, define success criteria\n2. **Planning** - Break work into shippable increments, identify risks and dependencies\n3. **Execution** - Build, test, review, iterate with regular team rhythm\n4. **Release** - Deploy to production with comprehensive verification\n5. **Close & Retrospective** - Capture learnings and continuous improvements\n\n## Documentation Guide\n\n### Project Management Overview\n- **[octoacme-project-management-overview.md](docs/octoacme-project-management-overview.md)** - Concise introduction to OctoAcme's project management approach, roles, and key artifacts\n\n### Phase-Specific Guides\n- **[octoacme-project-initiation.md](docs/octoacme-project-initiation.md)** - Steps to validate ideas, align stakeholders, and authorize work\n- **[octoacme-project-planning.md](docs/octoacme-project-planning.md)** - Turn approved initiatives into actionable plans and backlogs\n- **[octoacme-execution-and-tracking.md](docs/octoacme-execution-and-tracking.md)** - Manage day-to-day execution, team rhythm, and progress tracking\n- **[octoacme-release-and-deployment.md](docs/octoacme-release-and-deployment.md)** - Standardize how OctoAcme releases features to production\n- **[octoacme-retrospective-and-continuous-improvement.md](docs/octoacme-retrospective-and-continuous-improvement.md)** - Capture learnings and convert to improvements\n\n### Cross-Cutting Concerns\n- **[octoacme-risks-and-communication.md](docs/octoacme-risks-and-communication.md)** - Risk management, escalation paths, and stakeholder communication\n- **[octoacme-roles-and-personas.md](docs/octoacme-roles-and-personas.md)** - Definitions of key roles (Developers, Product Managers, Project Managers) and responsibilities\n\n## Key Roles\n- **Project Manager (PM)** - Coordinates delivery, manages schedules, risks, and communications\n- **Product Manager (PdM)** - Defines outcomes, prioritizes backlog, measures success\n- **Developers** - Implement features, collaborate on design and testability\n- **QA/Testing** - Validate quality and acceptance criteria\n\n## Communication Cadence\n- **Daily** - Team standups (15 min focus on progress, blockers, dependencies)\n- **Weekly** - Sync between PM + PdM; stakeholder updates\n- **Milestone-based** - Reviews, demos, retrospectives\n- **Ad-hoc** - Escalations and incident response\n\n## Getting Started\n1. **New to OctoAcme?** Start with [octoacme-project-management-overview.md](docs/octoacme-project-management-overview.md)\n2. **Starting a new project?** Follow [octoacme-project-initiation.md](docs/octoacme-project-initiation.md)\n3. **Need specific guidance?** Use the phase-specific guides above\n4. **Managing risks?** See [octoacme-risks-and-communication.md](docs/octoacme-risks-and-communication.md)\n\n## Questions?\nRefer to the relevant process document or reach out to your Project Manager or Product Lead.\n"
    validations:
      required: false

  - type: checkboxes
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "Check all that apply:"
      options:
        - label: "Content aligns with existing process docs"
          required: true
        - label: "Update improves clarity or closes a documented gap"
          required: true
        - label: "README serves as effective entry point with clear navigation"
          required: true
